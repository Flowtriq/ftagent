name: Test & Release ftagent

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_publish:
        description: 'Skip PyPI/GitHub publish (test only)'
        type: boolean
        default: false

jobs:
  # ── Stage 1: Unit tests (runs on GitHub-hosted runners, fast) ────────────
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[full]" pytest pytest-cov pytest-timeout

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short \
            --cov=ftagent --cov-report=term-missing \
            -x --timeout=60

      - name: Check coverage threshold
        run: |
          # Overall threshold is 25% because agent.py's Agent/MirrorAgent classes
          # (3000+ lines) require root, network interfaces, and systemd to test.
          # Pure logic functions (classify_attack, BaselineManager, flow parsers)
          # are thoroughly covered. Integration tests run on the self-hosted runner.
          pytest tests/ -q --cov=ftagent --cov-fail-under=25 --timeout=60

  # ── Stage 2: Deploy to test server and verify agent starts ─────────────────
  integration-test:
    name: Integration Test (Live Server)
    needs: unit-tests
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip3 install --break-system-packages --upgrade pip 2>/dev/null || true
          pip3 install --break-system-packages -e ".[full]" 2>&1 | tail -5

      - name: Write test config (only if missing)
        run: |
          mkdir -p /etc/ftagent 2>/dev/null || sudo mkdir -p /etc/ftagent
          if [ ! -f /etc/ftagent/config.json ]; then
            echo '{"api_key":"${{ secrets.STAGING_NODE_KEY }}","node_uuid":"${{ secrets.STAGING_NODE_UUID }}","api_base":"${{ secrets.STAGING_API_URL }}"}' > /etc/ftagent/config.json 2>/dev/null || echo '{"api_key":"${{ secrets.STAGING_NODE_KEY }}","node_uuid":"${{ secrets.STAGING_NODE_UUID }}","api_base":"${{ secrets.STAGING_API_URL }}"}' | sudo tee /etc/ftagent/config.json > /dev/null
            echo "Config written from secrets"
          else
            echo "Config already exists, skipping"
          fi

      - name: Run unit tests on server
        run: |
          pip3 install --break-system-packages pytest pytest-cov 2>/dev/null || true
          pytest tests/ -v --tb=short -x --timeout=60

      - name: Verify agent starts
        run: |
          # Run agent in test mode (single heartbeat then exit)
          timeout 30 ftagent --test 2>&1 || CODE=$?
          if [ "${CODE:-0}" -le 1 ]; then
            echo "Agent started and connected successfully"
          else
            echo "Agent failed to start (exit code: $CODE)"
            exit 1
          fi

      - name: Restart agent service
        run: |
          sudo systemctl restart ftagent 2>/dev/null || true
          sleep 5
          # Check it's running
          if systemctl is-active --quiet ftagent 2>/dev/null; then
            echo "ftagent service running"
            sudo journalctl -u ftagent --no-pager -n 10
          else
            echo "Warning: ftagent service not active (may not be installed as service)"
          fi

      - name: Verify agent is reporting
        run: |
          # Give it 15 seconds to send heartbeats, then check logs
          sleep 15
          if sudo journalctl -u ftagent --no-pager -n 5 2>/dev/null | grep -q "heartbeat\|online\|baseline"; then
            echo "Agent is reporting normally"
          else
            echo "Agent may not be reporting - check manually"
          fi

      - name: Resource consumption check
        run: |
          sleep 5
          PID=$(pgrep -f "ftagent" | head -1)
          if [ -n "$PID" ]; then
            MEM=$(ps -o rss= -p $PID | tr -d ' ')
            CPU=$(ps -o %cpu= -p $PID | tr -d ' ')
            echo "Memory: ${MEM}KB, CPU: ${CPU}%"
            # Fail if memory exceeds 200MB
            if [ "$MEM" -gt 204800 ]; then
              echo "FAIL: Memory too high (${MEM}KB > 200MB)"
              exit 1
            fi
            echo "Resource check passed"
          else
            echo "Agent process not found (may have exited cleanly)"
          fi

  # ── Stage 3: Build and publish (only on main branch push) ──────────────────
  publish:
    name: Build & Publish
    needs: integration-test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || !inputs.skip_publish)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version
        id: version
        run: |
          VER=$(python3 -c "import re; print(re.search(r'VERSION\s*=\s*\"([^\"]+)\"', open('ftagent/agent.py').read()).group(1))")
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Version: $VER"

      - name: Check if version already published
        id: check_pypi
        run: |
          pip3 install requests
          STATUS=$(python3 -c "
          import requests
          r = requests.get('https://pypi.org/pypi/ftagent/${{ steps.version.outputs.version }}/json')
          print('exists' if r.status_code == 200 else 'new')
          ")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "PyPI status: $STATUS"

      - name: Build package
        if: steps.check_pypi.outputs.status == 'new'
        run: |
          pip3 install build twine
          python3 -m build
          ls -la dist/

      - name: Publish to PyPI
        if: steps.check_pypi.outputs.status == 'new'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python3 -m twine upload dist/*
          echo "Published ftagent ${{ steps.version.outputs.version }} to PyPI"

      - name: Create GitHub Release
        if: steps.check_pypi.outputs.status == 'new'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.version.outputs.version }}"
          # Extract changelog for this version (between version headers)
          NOTES=$(awk "/^## $VER/,/^## [0-9]/" CHANGELOG.md | head -n -1 | tail -n +2)
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VER"
          fi
          gh release create "v$VER" dist/* \
            --title "v$VER" \
            --notes "$NOTES" \
            --latest
          echo "Created GitHub release v$VER"

      - name: Trigger Docker Hub rebuild
        if: steps.check_pypi.outputs.status == 'new'
        env:
          GH_TOKEN: ${{ secrets.DOCKER_DISPATCH_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Flowtriq/ftagent-docker/dispatches \
            -d '{"event_type":"ftagent-release","client_payload":{"version":"${{ steps.version.outputs.version }}"}}'
          echo "Triggered Docker rebuild for v${{ steps.version.outputs.version }}"
